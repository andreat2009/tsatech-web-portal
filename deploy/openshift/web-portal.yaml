apiVersion: v1
kind: ConfigMap
metadata:
  name: web-portal-config
data:
  KEYCLOAK_ISSUER_URI: https://keycloak-platform.apps-crc.testing/realms/master
  KEYCLOAK_CLIENT_ID: web-portal
  GATEWAY_BASE_URL: https://api-gateway-platform.apps-crc.testing
  SERVER_PORT: "8443"
  SERVER_SSL_ENABLED: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: web-portal-secret
stringData:
  KEYCLOAK_CLIENT_SECRET: changeme
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-portal
  template:
    metadata:
      labels:
        app: web-portal
    spec:
      containers:
        - name: web-portal
          image: web-portal:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
          envFrom:
            - configMapRef:
                name: web-portal-config
            - secretRef:
                name: web-portal-secret
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Djavax.net.ssl.trustStore=/etc/ssl/openshift/truststore.jks -Djavax.net.ssl.trustStorePassword=changeit"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8443
              scheme: HTTPS
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8443
              scheme: HTTPS
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: truststore
              mountPath: /etc/ssl/openshift
              readOnly: true
            - name: service-tls
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: truststore
          secret:
            secretName: platform-truststore
        - name: service-tls
          secret:
            secretName: web-portal-tls
---
apiVersion: v1
kind: Service
metadata:
  name: web-portal
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: web-portal-tls
spec:
  selector:
    app: web-portal
  ports:
    - port: 8443
      targetPort: 8443
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: web-portal
spec:
  host: web-portal-platform.apps-crc.testing
  to:
    kind: Service
    name: web-portal
  port:
    targetPort: 8443
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
