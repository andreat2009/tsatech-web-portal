image:
  repository: ghcr.io/andreat2009/tsatech-web-portal
  tag: latest
  digest: ""
  pullPolicy: Always

global:
  domain: "apps.example.invalid"
  platformNamespace: "platform"
  appNamespace: "ecommerce"

route:
  enabled: false
  host: ""
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect
  annotations: {}

ingress:
  enabled: true
  className: nginx
  host: '{{ printf "%s-%s.%s" .Release.Name .Release.Namespace .Values.global.domain }}'
  path: /
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  tls:
    enabled: true
    secretName: wildcard-apps-tls

env:
  KEYCLOAK_CLIENT_ID: "web-portal"
  KEYCLOAK_ISSUER_URI: '{{ printf "https://keycloak-%s.%s/realms/master" .Values.global.platformNamespace .Values.global.domain }}'
  KEYCLOAK_ADMIN_BASE_URL: '{{ printf "http://keycloak.%s.svc.cluster.local" .Values.global.platformNamespace }}'
  GATEWAY_BASE_URL: '{{ printf "http://api-gateway.%s.svc.cluster.local:8443" .Values.global.appNamespace }}'
  APP_STORE_URL: '{{ printf "https://%s-%s.%s" .Release.Name .Release.Namespace .Values.global.domain }}'
  KEYCLOAK_ACCOUNT_URL: '{{ printf "https://keycloak-%s.%s/realms/master/account" .Values.global.platformNamespace .Values.global.domain }}'
  KEYCLOAK_AUTHORIZATION_URI: '{{ printf "https://keycloak-%s.%s/realms/master/protocol/openid-connect/auth" .Values.global.platformNamespace .Values.global.domain }}'
  KEYCLOAK_TOKEN_URI: '{{ printf "http://keycloak.%s.svc.cluster.local/realms/master/protocol/openid-connect/token" .Values.global.platformNamespace }}'
  KEYCLOAK_JWK_SET_URI: '{{ printf "http://keycloak.%s.svc.cluster.local/realms/master/protocol/openid-connect/certs" .Values.global.platformNamespace }}'
  KEYCLOAK_USERINFO_URI: '{{ printf "http://keycloak.%s.svc.cluster.local/realms/master/protocol/openid-connect/userinfo" .Values.global.platformNamespace }}'
  SERVER_PORT: "8443"
  SERVER_SSL_ENABLED: "false"

secret:
  name: web-portal-secret
  create: false
  data: {}

secretEnv:
  KEYCLOAK_CLIENT_SECRET: KEYCLOAK_CLIENT_SECRET

tls:
  enabled: false
  secretName: wildcard-apps-tls

truststore:
  enabled: false
  secretName: platform-truststore
  mountPath: /etc/ssl/openshift
  password: changeit

readinessProbe:
  scheme: HTTP
  path: /actuator/health
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe:
  scheme: HTTP
  path: /actuator/health
  initialDelaySeconds: 20
  periodSeconds: 20
