<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Indirizzi</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="page-header">
        <h1>I miei indirizzi</h1>
        <a class="btn" th:href="@{/account/ordini}">Vai agli ordini</a>
    </div>

    <section class="grid-2">
        <div>
            <h2>Elenco indirizzi</h2>
            <div th:if="${addresses.isEmpty()}" class="empty">Nessun indirizzo configurato.</div>
            <div class="address-card" th:each="address : ${addresses}">
                <div class="address-line" th:text="${address.line1}">Line1</div>
                <div class="address-line muted" th:text="${address.line2}">Line2</div>
                <div class="address-line" th:text="${address.city + ', ' + address.country + ' ' + address.postalCode}">City</div>
                <span class="badge" th:if="${address.isDefault}">Default</span>
            </div>
        </div>

        <div>
            <h2>Nuovo indirizzo</h2>
            <form class="form" th:action="@{/account/indirizzi}" method="post" th:object="${addressForm}">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="field">
                    <label>Indirizzo riga 1</label>
                    <input th:field="*{line1}" required />
                </div>
                <div class="field">
                    <label>Indirizzo riga 2</label>
                    <input th:field="*{line2}" />
                </div>
                <div class="grid-2">
                    <div class="field">
                        <label>Città</label>
                        <input th:field="*{city}" required />
                    </div>
                    <div class="field">
                        <label>Regione</label>
                        <input th:field="*{region}" />
                    </div>
                </div>
                <div class="grid-2">
                    <div class="field">
                        <label>Paese</label>
                        <input th:field="*{country}" required />
                    </div>
                    <div class="field">
                        <label>CAP</label>
                        <input th:field="*{postalCode}" required />
                    </div>
                </div>
                <label class="checkbox-inline">
                    <input type="checkbox" th:field="*{isDefault}" />
                    Imposta come indirizzo predefinito
                </label>
                <button class="btn btn-primary" type="submit">Salva indirizzo</button>
            </form>
        </div>
    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
