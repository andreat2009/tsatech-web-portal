<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
    <section class="card" style="padding:16px;">
        <h1>I tuoi download</h1>
        <table class="table">
            <thead><tr><th>Nome</th><th>File</th><th>Ordine</th><th>Dimensione</th><th>Data</th></tr></thead>
            <tbody>
            <tr th:each="d : ${downloads}">
                <td th:text="${d.name}">Manuale</td>
                <td th:text="${d.filename}">manual.pdf</td>
                <td th:text="${d.orderId}">1</td>
                <td th:text="${d.sizeBytes}">1024</td>
                <td th:text="${d.createdAt}">2026-01-01</td>
            </tr>
            <tr th:if="${#lists.isEmpty(downloads)}"><td colspan="5">Nessun download disponibile.</td></tr>
            </tbody>
        </table>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
