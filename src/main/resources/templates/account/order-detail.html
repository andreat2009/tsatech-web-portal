<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{account.order.detail.title}">Order details</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="page-header">
        <h1><span th:text="#{common.order}">Order</span> #<span th:text="${order.id}">1</span></h1>
        <div class="actions">
            <a class="btn" th:href="@{/account/ordini}" th:text="#{account.order.detail.back.orders}">Back to orders</a>
            <a class="btn" th:href="@{/account/resi}" th:text="#{account.order.detail.my.returns}">My returns</a>
        </div>
    </div>

    <section class="order-meta card-lite">
        <div><strong th:text="#{common.status} + ':'">Status:</strong> <span th:text="${order.status}">NEW</span></div>
        <div><strong th:text="#{common.date} + ':'">Date:</strong> <span th:text="${order.createdAt}">-</span></div>
        <div><strong th:text="#{common.total} + ':'">Total:</strong> <span th:text="${order.total != null ? #numbers.formatDecimal(order.total, 1, 'POINT', 2, 'POINT') : '0.00'}">0.00</span></div>
    </section>

    <section>
        <h2 th:text="#{account.order.detail.lines}">Order lines</h2>
        <table class="table">
            <thead>
            <tr>
                <th th:text="#{common.sku}">SKU</th>
                <th th:text="#{common.product}">Product</th>
                <th th:text="#{common.quantity}">Quantity</th>
                <th th:text="#{account.order.detail.unit.price}">Unit price</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.sku}">SKU</td>
                <td th:text="${item.name}">Name</td>
                <td th:text="${item.quantity}">1</td>
                <td th:text="${item.unitPrice != null ? #numbers.formatDecimal(item.unitPrice, 1, 'POINT', 2, 'POINT') : '0.00'}">0.00</td>
            </tr>
            </tbody>
        </table>
    </section>

    <section class="grid-2">
        <div>
            <h2 th:text="#{account.order.detail.payments}">Payments</h2>
            <table class="table compact">
                <thead>
                <tr>
                    <th>ID</th>
                    <th th:text="#{common.provider}">Provider</th>
                    <th th:text="#{common.status}">Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="payment : ${payments}">
                    <td th:text="${payment.id}">1</td>
                    <td th:text="${payment.provider}">cod</td>
                    <td th:text="${payment.status}">CREATED</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div>
            <h2 th:text="#{account.order.detail.shipments}">Shipments</h2>
            <table class="table compact">
                <thead>
                <tr>
                    <th>ID</th>
                    <th th:text="#{common.carrier}">Carrier</th>
                    <th th:text="#{common.tracking}">Tracking</th>
                    <th th:text="#{common.status}">Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="shipment : ${shipments}">
                    <td th:text="${shipment.id}">1</td>
                    <td th:text="${shipment.carrier}">FLAT_RATE</td>
                    <td th:text="${shipment.trackingNumber}">TRK</td>
                    <td th:text="${shipment.status}">CREATED</td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section>
        <h2 th:text="#{account.order.detail.open.return}">Open return</h2>
        <form class="form" th:action="@{/account/resi}" method="post" th:object="${returnForm}">
            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" th:field="*{orderId}" />
            <div class="field">
                <label th:text="#{account.order.detail.item.optional}">Order line (optional)</label>
                <select th:field="*{orderItemId}">
                    <option value="" th:text="#{account.order.detail.whole.order}">Whole order</option>
                    <option th:each="item : ${items}" th:value="${item.id}" th:text="${item.name + ' (x' + item.quantity + ')'}">Item</option>
                </select>
            </div>
            <div class="field">
                <label th:text="#{account.order.detail.reason}">Reason</label>
                <input th:field="*{reason}" th:placeholder="#{account.order.detail.reason.placeholder}" required />
            </div>
            <div class="field">
                <label th:text="#{account.order.detail.comment}">Comment</label>
                <textarea th:field="*{comment}" rows="3"></textarea>
            </div>
            <button class="btn btn-primary" type="submit" th:text="#{account.order.detail.submit.return}">Submit return request</button>
        </form>
    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
