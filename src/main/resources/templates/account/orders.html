<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Ordini</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="page-header">
        <h1>I miei ordini</h1>
        <div class="actions">
            <a class="btn" th:href="@{/account/indirizzi}">I miei indirizzi</a>
            <a class="btn" th:href="@{/account/lista-desideri}">Wishlist</a>
            <a class="btn" th:href="@{/account/resi}">Resi</a>
        </div>
    </div>

    <div th:if="${orders.isEmpty()}" class="empty">Nessun ordine disponibile.</div>

    <table class="table" th:if="${!orders.isEmpty()}">
        <thead>
            <tr>
                <th>ID</th>
                <th>Data</th>
                <th>Totale</th>
                <th>Status</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}">1</td>
                <td th:text="${order.createdAt}">-</td>
                <td th:text="${order.total}">0.00</td>
                <td th:text="${order.status}">NEW</td>
                <td>
                    <a class="btn" th:href="@{/account/ordini/{id}(id=${order.id})}">Dettaglio</a>
                </td>
            </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
