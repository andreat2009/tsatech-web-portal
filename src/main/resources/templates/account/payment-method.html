<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metodi di Pagamento</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
    <section class="card" style="padding:16px;">
        <h1>Metodo di pagamento predefinito</h1>
        <p>La gestione dei metodi di pagamento è centralizzata nel checkout e in Keycloak.</p>
        <h2>Indirizzi disponibili</h2>
        <ul>
            <li th:each="a : ${addresses}">
                <span th:text="${a.line1} + ', ' + ${a.city} + ' (' + ${a.country} + ')'">indirizzo</span>
                <strong th:if="${a.isDefault}"> [Default]</strong>
            </li>
        </ul>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
