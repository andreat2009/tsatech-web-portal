<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="#{account.register.title}">Register</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="breadcrumbs">
        <a th:href="@{/}" th:text="#{menu.home}">Home</a>
        <span>/</span>
        <span th:text="#{account.register.breadcrumb}">Register</span>
    </div>

    <h1 th:text="#{account.register.heading}">Create account</h1>
    <p class="muted" th:text="#{account.register.description}">Registration is handled by Keycloak.</p>

    <section class="success-box">
        <p th:text="#{account.register.keycloak.role}">The account will be created in Keycloak with USER role.</p>
        <p th:text="#{account.register.keycloak.note}">After registration you will be redirected to the store as authenticated customer.</p>

        <div class="actions-row">
            <a class="btn btn-primary" th:href="${keycloakRegisterUrl}" th:text="#{account.register.keycloak.button}">Register on Keycloak</a>
            <a class="btn" th:href="@{/oauth2/authorization/keycloak}" th:text="#{account.register.login}">Go to login</a>
        </div>
    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
