<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{account.returns.title}">Returns</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="page-header">
        <h1 th:text="#{account.returns.heading}">My returns</h1>
        <a class="btn" th:href="@{/account/ordini}" th:text="#{account.returns.back.orders}">Back to orders</a>
    </div>

    <div class="grid-2">
        <div>
            <h2 th:text="#{account.returns.history}">Return history</h2>
            <div th:if="${returns.isEmpty()}" class="empty" th:text="#{account.returns.empty}">No open returns.</div>
            <table class="table" th:if="${!returns.isEmpty()}">
                <thead>
                <tr>
                    <th>ID</th>
                    <th th:text="#{common.order}">Order</th>
                    <th th:text="#{account.order.detail.reason}">Reason</th>
                    <th th:text="#{common.status}">Status</th>
                    <th th:text="#{common.date}">Date</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="ret : ${returns}">
                    <td th:text="${ret.id}">1</td>
                    <td th:text="${ret.orderId}">100</td>
                    <td th:text="${ret.reason}">reason</td>
                    <td th:text="${ret.status}">REQUESTED</td>
                    <td th:text="${ret.createdAt}">-</td>
                </tr>
                </tbody>
            </table>
        </div>

        <div>
            <h2 th:text="#{account.returns.new}">New return</h2>
            <form class="form" th:action="@{/account/resi}" method="post" th:object="${returnForm}">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="field">
                    <label th:text="#{common.order}">Order</label>
                    <select th:field="*{orderId}" required>
                        <option value="" th:text="#{account.returns.select.order}">Select order</option>
                        <option th:each="order : ${orders}" th:value="${order.id}" th:text="${#messages.msg('common.order') + ' #' + order.id + ' - ' + (order.total != null ? #numbers.formatDecimal(order.total, 1, 'POINT', 2, 'POINT') : '0.00')}">Order</option>
                    </select>
                </div>
                <div class="field">
                    <label th:text="#{account.order.detail.reason}">Reason</label>
                    <input th:field="*{reason}" required />
                </div>
                <div class="field">
                    <label th:text="#{account.order.detail.comment}">Comment</label>
                    <textarea th:field="*{comment}" rows="3"></textarea>
                </div>
                <button class="btn btn-primary" type="submit" th:text="#{account.returns.open}">Open return</button>
            </form>
        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
