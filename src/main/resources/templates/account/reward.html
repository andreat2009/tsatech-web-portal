<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reward</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
    <section class="card" style="padding:16px; margin-bottom:16px;">
        <h1>Punti Reward</h1>
        <p>Saldo attuale: <strong th:text="${rewardSummary.pointsBalance}">0</strong></p>
    </section>
    <section class="card" style="padding:16px;">
        <h2>Movimenti punti</h2>
        <table class="table">
            <thead>
            <tr><th>Data</th><th>Descrizione</th><th>Ordine</th><th>Punti</th></tr>
            </thead>
            <tbody>
            <tr th:each="tx : ${rewardTransactions}">
                <td th:text="${tx.createdAt}">2026-01-01</td>
                <td th:text="${tx.description}">Acquisto</td>
                <td th:text="${tx.orderId}">1</td>
                <td th:text="${tx.pointsDelta}">10</td>
            </tr>
            <tr th:if="${#lists.isEmpty(rewardTransactions)}"><td colspan="4">Nessun movimento.</td></tr>
            </tbody>
        </table>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
