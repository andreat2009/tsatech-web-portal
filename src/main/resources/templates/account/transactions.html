<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{account.transactions.title}">Transactions</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
    <section class="card section-pad">
        <h1 th:text="#{account.transactions.heading}">Account transactions</h1>
        <table class="table">
            <thead>
            <tr><th th:text="#{common.date}">Date</th><th th:text="#{common.description}">Description</th><th th:text="#{common.order}">Order</th><th th:text="#{common.amount}">Amount</th></tr>
            </thead>
            <tbody>
            <tr th:each="tx : ${transactions}">
                <td th:text="${tx.createdAt}">2026-01-01</td>
                <td th:text="${tx.description}">Refund</td>
                <td th:text="${tx.orderId}">1</td>
                <td th:text="${tx.amount != null ? #numbers.formatDecimal(tx.amount, 1, 'POINT', 2, 'POINT') : '0.00'}">0.00</td>
            </tr>
            <tr th:if="${#lists.isEmpty(transactions)}"><td colspan="4" th:text="#{account.transactions.empty}">No transactions.</td></tr>
            </tbody>
        </table>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
