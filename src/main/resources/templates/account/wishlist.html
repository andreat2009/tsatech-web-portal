<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Wishlist</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="page-header">
        <h1>Wishlist</h1>
        <a class="btn" th:href="@{/shop}">Continua acquisti</a>
    </div>

    <div th:if="${wishlistItems.isEmpty()}" class="empty">Wishlist vuota.</div>

    <table class="table" th:if="${!wishlistItems.isEmpty()}">
        <thead>
        <tr>
            <th>Prodotto</th>
            <th>Prezzo</th>
            <th>Aggiunto il</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="entry : ${wishlistItems}">
            <td>
                <a th:href="@{/shop/products/{id}(id=${entry.product.id})}" th:text="${entry.product.name}">Prodotto</a>
            </td>
            <td th:text="${entry.product.price}">0.00</td>
            <td th:text="${entry.addedAt}">-</td>
            <td class="actions">
                <form th:action="@{/cart/add}" method="post">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="productId" th:value="${entry.product.id}" />
                    <input type="hidden" name="quantity" value="1" />
                    <button class="btn btn-primary" type="submit">Aggiungi al carrello</button>
                </form>
                <form th:action="@{/account/wishlist/{id}/delete(id=${entry.product.id})}" method="post">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button class="btn btn-link" type="submit">Rimuovi</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
