<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${#messages.msg(formTitleKey)}">Form blog</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
    <section class="form section-pad centered-form">
        <h1 th:text="${#messages.msg(formTitleKey)}">Form blog</h1>
        <form method="post" th:action="${formAction}" th:object="${postForm}">
            <div class="field"><label>Slug</label><input type="text" th:field="*{slug}" /></div>
            <div class="field"><label th:text="#{common.author}">Autore</label><input type="text" th:field="*{author}" /></div>
            <div class="field"><label><input type="checkbox" th:field="*{active}" /> <span th:text="#{common.active}">Attivo</span></label></div>

            <section class="translation-section">
                <h2 th:text="#{common.multilingual.content}">Contenuti multilingua</h2>
                <div class="translation-grid">
                    <div class="translation-card" th:each="lang : ${languageOptions}">
                        <h3><span class="lang-flag" th:text="${lang.flag}">IT</span> <span th:text="${lang.label}">Italiano</span></h3>
                        <div class="field">
                            <label th:text="#{common.title}">Titolo</label>
                            <input type="text"
                                   th:name="${'translations[' + lang.code + '].title'}"
                                   th:value="${postForm.translations != null and postForm.translations[lang.code] != null ? postForm.translations[lang.code].title : ''}"
                                   th:required="${lang.code == 'it'}" />
                        </div>
                        <div class="field">
                            <label th:text="#{common.excerpt}">Estratto</label>
                            <textarea rows="3"
                                      th:name="${'translations[' + lang.code + '].excerpt'}"
                                      th:text="${postForm.translations != null and postForm.translations[lang.code] != null ? postForm.translations[lang.code].excerpt : ''}"></textarea>
                        </div>
                        <div class="field">
                            <label th:text="#{common.content}">Contenuto</label>
                            <textarea rows="8"
                                      th:name="${'translations[' + lang.code + '].content'}"
                                      th:text="${postForm.translations != null and postForm.translations[lang.code] != null ? postForm.translations[lang.code].content : ''}"></textarea>
                        </div>
                    </div>
                </div>
            </section>

            <button class="btn btn-primary" type="submit" th:text="#{common.save}">Salva</button>
            <a class="btn" th:href="@{/admin/blog/posts}" th:text="#{common.cancel}">Annulla</a>
        </form>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
