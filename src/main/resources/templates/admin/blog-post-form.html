<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${formTitle}">Form blog</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
    <section class="form" style="padding:16px; max-width:900px; margin:0 auto;">
        <h1 th:text="${formTitle}">Form blog</h1>
        <form method="post" th:action="${formAction}" th:object="${postForm}">
            <div class="field"><label>Titolo</label><input type="text" th:field="*{title}" /></div>
            <div class="field"><label>Slug</label><input type="text" th:field="*{slug}" /></div>
            <div class="field"><label>Autore</label><input type="text" th:field="*{author}" /></div>
            <div class="field"><label>Estratto</label><textarea th:field="*{excerpt}" rows="3"></textarea></div>
            <div class="field"><label>Contenuto</label><textarea th:field="*{content}" rows="10"></textarea></div>
            <div class="field"><label><input type="checkbox" th:field="*{active}" /> Attivo</label></div>
            <button class="btn btn-primary" type="submit">Salva</button>
            <a class="btn" th:href="@{/admin/blog/posts}">Annulla</a>
        </form>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
