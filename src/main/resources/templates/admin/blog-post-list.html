<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{admin.blog.posts.title}">Admin Blog</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
    <section class="card section-pad">
        <h1 th:text="#{admin.blog.posts.title}">Articoli blog</h1>
        <p><a class="btn btn-primary" th:href="@{/admin/blog/posts/new}" th:text="#{admin.blog.post.new}">Nuovo articolo</a></p>
        <table class="table">
            <thead><tr><th>ID</th><th th:text="#{common.title}">Titolo</th><th>Slug</th><th th:text="#{common.published}">Pubblicato</th><th th:text="#{common.active}">Attivo</th><th th:text="#{common.actions}">Azioni</th></tr></thead>
            <tbody>
            <tr th:each="p : ${posts}">
                <td th:text="${p.id}">1</td>
                <td th:text="${p.title}">Titolo</td>
                <td th:text="${p.slug}">slug</td>
                <td th:text="${p.publishedAt}">2026-01-01</td>
                <td th:text="${p.active}">true</td>
                <td>
                    <a th:href="@{/admin/blog/posts/{id}/edit(id=${p.id})}" th:text="#{common.edit}">Modifica</a>
                    <form method="post" th:action="@{/admin/blog/posts/{id}/delete(id=${p.id})}" class="inline-form-action">
                        <button class="btn" type="submit" th:text="#{common.delete}">Elimina</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
