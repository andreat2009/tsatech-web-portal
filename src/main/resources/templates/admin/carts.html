<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{admin.carts.title}">Admin Carrelli</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <h1 th:text="#{admin.carts.title}">Carrelli</h1>
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th th:text="#{admin.carts.customer}">Cliente</th>
                <th th:text="#{common.currency}">Valuta</th>
                <th th:text="#{common.status}">Stato</th>
                <th th:text="#{common.created.at}">Creato il</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="cart : ${carts}">
                <td th:text="${cart.id}">1</td>
                <td th:text="${cart.customerId}">1</td>
                <td th:text="${cart.currency}">EUR</td>
                <td th:text="${cart.status}">OPEN</td>
                <td th:text="${cart.createdAt}">-</td>
            </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
