<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Categorie</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="page-header">
        <h1>Categorie</h1>
        <a class="btn btn-primary" th:href="@{/admin/categories/new}">Nuova categoria</a>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Parent</th>
            <th>Sort</th>
            <th>Attiva</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.id}">1</td>
            <td th:text="${category.name}">Name</td>
            <td th:text="${category.parentId}">-</td>
            <td th:text="${category.sortOrder}">0</td>
            <td th:text="${category.active}">true</td>
            <td class="actions">
                <a class="btn" th:href="@{/admin/categories/{id}/edit(id=${category.id})}">Modifica</a>
                <form th:action="@{/admin/categories/{id}/delete(id=${category.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button class="btn btn-link" type="submit">Elimina</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
