<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{admin.categories.title}">Categorie</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="page-header">
        <h1 th:text="#{admin.categories.title}">Categorie</h1>
        <a class="btn btn-primary" th:href="@{/admin/catalogo/categorie/new}" th:text="#{admin.category.new}">Nuova categoria</a>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th th:text="#{common.name}">Nome</th>
            <th th:text="#{common.parent}">Parent</th>
            <th th:text="#{common.sort}">Sort</th>
            <th th:text="#{common.active}">Attiva</th>
            <th th:text="#{common.actions}">Azioni</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.id}">1</td>
            <td th:text="${category.name}">Name</td>
            <td th:text="${category.parentId}">-</td>
            <td th:text="${category.sortOrder}">0</td>
            <td th:text="${category.active}">true</td>
            <td class="actions">
                <a class="btn" th:href="@{/admin/catalogo/categorie/{id}/edit(id=${category.id})}" th:text="#{common.edit}">Modifica</a>
                <form th:action="@{/admin/catalogo/categorie/{id}/delete(id=${category.id})}" method="post">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button class="btn btn-link" type="submit" th:text="#{common.delete}">Elimina</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
