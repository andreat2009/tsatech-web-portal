<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${formTitle}">Coupon</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <div class="page-header">
        <h1 th:text="${formTitle}">Coupon</h1>
        <a class="btn" th:href="@{/admin/marketing/coupon}">Torna all'elenco</a>
    </div>

    <form class="form" th:action="${formAction}" method="post" th:object="${coupon}">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="field grid-2">
            <div>
                <label>Code</label>
                <input th:field="*{code}" required />
            </div>
            <div>
                <label>Valuta</label>
                <input th:field="*{currency}" required />
            </div>
        </div>

        <section class="translation-section">
            <h2>Contenuti multilingua</h2>
            <div class="translation-grid">
                <div class="translation-card" th:each="lang : ${languageOptions}">
                    <h3><span class="lang-flag" th:text="${lang.flag}">IT</span> <span th:text="${lang.label}">Italiano</span></h3>
                    <div class="field">
                        <label>Nome coupon</label>
                        <input type="text"
                               th:name="${'translations[' + lang.code + '].name'}"
                               th:value="${coupon.translations != null and coupon.translations[lang.code] != null ? coupon.translations[lang.code].name : ''}"
                               th:required="${lang.code == 'it'}" />
                    </div>
                </div>
            </div>
        </section>

        <div class="field grid-2">
            <div>
                <label>Tipo sconto</label>
                <select th:field="*{discountType}">
                    <option value="PERCENT">PERCENT</option>
                    <option value="FIXED">FIXED</option>
                </select>
            </div>
            <div>
                <label>Valore</label>
                <input type="number" step="0.0001" th:field="*{value}" required />
            </div>
        </div>

        <div class="field grid-2">
            <div>
                <label>Minimo ordine</label>
                <input type="number" step="0.0001" th:field="*{minTotal}" required />
            </div>
            <div>
                <label>Max sconto</label>
                <input type="number" step="0.0001" th:field="*{maxDiscount}" />
            </div>
        </div>

        <div class="field grid-2">
            <div>
                <label>Usage limit</label>
                <input type="number" th:field="*{usageLimit}" />
            </div>
            <div>
                <label>Attivo</label>
                <select th:field="*{active}">
                    <option th:value="true">true</option>
                    <option th:value="false">false</option>
                </select>
            </div>
        </div>

        <div class="actions space-top">
            <button class="btn btn-primary" type="submit">Salva</button>
            <a class="btn" th:href="@{/admin/marketing/coupon}">Annulla</a>
        </div>
    </form>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
