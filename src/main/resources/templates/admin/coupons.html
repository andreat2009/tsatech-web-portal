<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Coupon</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="page-header">
        <h1>Coupon</h1>
        <a class="btn btn-primary" th:href="@{/admin/marketing/coupon/new}">Nuovo coupon</a>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Code</th>
            <th>Nome</th>
            <th>Tipo</th>
            <th>Valore</th>
            <th>Min Total</th>
            <th>Attivo</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="coupon : ${coupons}">
            <td th:text="${coupon.id}">1</td>
            <td th:text="${coupon.code}">WELCOME10</td>
            <td th:text="${coupon.name}">Benvenuto</td>
            <td th:text="${coupon.discountType}">PERCENT</td>
            <td th:text="${coupon.value}">10</td>
            <td th:text="${coupon.minTotal}">0</td>
            <td th:text="${coupon.active}">true</td>
            <td class="actions">
                <a class="btn" th:href="@{/admin/marketing/coupon/{id}/edit(id=${coupon.id})}">Modifica</a>
                <form th:action="@{/admin/marketing/coupon/{id}/delete(id=${coupon.id})}" method="post">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button class="btn btn-link" type="submit">Elimina</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
