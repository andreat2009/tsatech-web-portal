<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <h1>Dashboard Admin</h1>
    <div class="grid stats">
        <div class="card">
            <div class="stat-label">Prodotti</div>
            <div class="stat-value" th:text="${productCount}">0</div>
            <a class="btn" th:href="@{/admin/products}">Gestisci prodotti</a>
        </div>
        <div class="card">
            <div class="stat-label">Ordini</div>
            <div class="stat-value" th:text="${orderCount}">0</div>
            <a class="btn" th:href="@{/admin/orders}">Gestisci ordini</a>
        </div>
        <div class="card">
            <div class="stat-label">Pagamenti</div>
            <div class="stat-value" th:text="${paymentCount}">0</div>
            <a class="btn" th:href="@{/admin/payments}">Gestisci pagamenti</a>
        </div>
        <div class="card">
            <div class="stat-label">Spedizioni</div>
            <div class="stat-value" th:text="${shipmentCount}">0</div>
            <a class="btn" th:href="@{/admin/shipments}">Gestisci spedizioni</a>
        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
