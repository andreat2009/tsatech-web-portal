<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${formTitle}">Form pagina</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
    <section class="form section-pad centered-form">
        <h1 th:text="${formTitle}">Form</h1>
        <form method="post" th:action="${formAction}" th:object="${pageForm}">
            <div class="field"><label>Slug</label><input type="text" th:field="*{slug}" /></div>
            <div class="field"><label>Sort order</label><input type="number" th:field="*{sortOrder}" /></div>
            <div class="field"><label><input type="checkbox" th:field="*{active}" /> Attiva</label></div>

            <section class="translation-section">
                <h2>Contenuti multilingua</h2>
                <div class="translation-grid">
                    <div class="translation-card" th:each="lang : ${languageOptions}">
                        <h3><span class="lang-flag" th:text="${lang.flag}">IT</span> <span th:text="${lang.label}">Italiano</span></h3>
                        <div class="field">
                            <label>Titolo</label>
                            <input type="text"
                                   th:name="${'translations[' + lang.code + '].title'}"
                                   th:value="${pageForm.translations != null and pageForm.translations[lang.code] != null ? pageForm.translations[lang.code].title : ''}"
                                   th:required="${lang.code == 'it'}" />
                        </div>
                        <div class="field">
                            <label>Contenuto (HTML)</label>
                            <textarea rows="8"
                                      th:name="${'translations[' + lang.code + '].content'}"
                                      th:text="${pageForm.translations != null and pageForm.translations[lang.code] != null ? pageForm.translations[lang.code].content : ''}"></textarea>
                        </div>
                    </div>
                </div>
            </section>

            <button class="btn btn-primary" type="submit">Salva</button>
            <a class="btn" th:href="@{/admin/information}">Annulla</a>
        </form>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
