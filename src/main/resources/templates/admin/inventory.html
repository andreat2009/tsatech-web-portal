<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{admin.inventory.title}">Admin Inventario</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <h1 th:text="#{admin.inventory.title}">Inventario</h1>
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th th:text="#{common.product}">Prodotto</th>
                <th th:text="#{admin.inventory.on.hand}">On hand</th>
                <th th:text="#{admin.inventory.reserved}">Reserved</th>
                <th th:text="#{common.updated.at}">Aggiornato</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${inventoryItems}">
                <td th:text="${item.id}">1</td>
                <td th:text="${item.productId}">1001</td>
                <td th:text="${item.onHand}">0</td>
                <td th:text="${item.reserved}">0</td>
                <td th:text="${item.updatedAt}">-</td>
            </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
