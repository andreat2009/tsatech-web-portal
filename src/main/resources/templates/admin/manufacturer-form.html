<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${#messages.msg(formTitleKey)}">Produttore</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <div class="page-header">
        <h1 th:text="${#messages.msg(formTitleKey)}">Produttore</h1>
        <a class="btn" th:href="@{/admin/catalogo/produttori}" th:text="#{common.back.to.list}">Torna all'elenco</a>
    </div>

    <form class="form" th:action="${formAction}" method="post" th:object="${manufacturer}">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="field">
            <label th:text="#{admin.manufacturer.field.name}">Nome produttore</label>
            <input type="text" th:field="*{name}" required />
        </div>

        <div class="field">
            <label th:text="#{admin.manufacturer.image.url}">URL immagine/logo</label>
            <input type="url" th:field="*{image}" placeholder="https://..." />
        </div>

        <div class="field">
            <label th:text="#{common.status}">Stato</label>
            <select th:field="*{active}">
                <option th:value="true" th:text="#{common.active}">Attivo</option>
                <option th:value="false" th:text="#{common.inactive}">Disattivo</option>
            </select>
        </div>

        <div class="actions space-top">
            <button class="btn btn-primary" type="submit" th:text="#{common.save}">Salva</button>
            <a class="btn" th:href="@{/admin/catalogo/produttori}" th:text="#{common.cancel}">Annulla</a>
        </div>
    </form>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
