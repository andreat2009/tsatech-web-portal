<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{admin.orders.title}">Admin Ordini</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <h1 th:text="#{admin.orders.title}">Ordini</h1>

    <p class="alert-success" th:if="${statusUpdated}" th:text="#{admin.orders.status.updated}">Stato ordine aggiornato.</p>
    <p class="alert-error" th:if="${statusError != null and statusError == 'invalid'}" th:text="#{admin.orders.status.invalid}">Stato non valido.</p>
    <p class="alert-error" th:if="${statusError != null and statusError == 'update'}" th:text="#{admin.orders.status.error}">Impossibile aggiornare lo stato ordine.</p>

    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th th:text="#{admin.carts.customer}">Cliente</th>
                <th th:text="#{admin.orders.customer.email}">Email</th>
                <th th:text="#{admin.orders.type}">Tipo</th>
                <th th:text="#{common.date}">Data</th>
                <th th:text="#{common.total}">Totale</th>
                <th th:text="#{common.status}">Status</th>
                <th th:text="#{common.actions}">Azioni</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}">1</td>
                <td th:text="${(order.customerFirstName != null ? order.customerFirstName : '') + ' ' + (order.customerLastName != null ? order.customerLastName : '')}">Cliente</td>
                <td th:text="${order.customerEmail != null ? order.customerEmail : '-'}">mail@example.com</td>
                <td th:text="${order.guestCheckout != null and order.guestCheckout ? #messages.msg('admin.orders.guest') : #messages.msg('admin.orders.registered')}">Registered</td>
                <td th:text="${order.createdAt}">-</td>
                <td th:text="${order.total != null ? #numbers.formatDecimal(order.total, 1, 'POINT', 2, 'POINT') : '0.00'}">0.00</td>
                <td th:text="${order.status}">Confirmed</td>
                <td>
                    <form method="post" th:action="@{/admin/orders/{id}/status(id=${order.id})}" class="inline-form-action">
                        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <select name="status">
                            <option th:each="statusOption : ${orderStatusOptions}"
                                    th:value="${statusOption}"
                                    th:text="${statusOption}"
                                    th:selected="${order.status == statusOption}">Confirmed</option>
                        </select>
                        <button class="btn btn-primary" type="submit" th:text="#{admin.orders.update.status}">Aggiorna stato</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
