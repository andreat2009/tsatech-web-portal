<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{admin.orders.title}">Admin Ordini</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <h1 th:text="#{admin.orders.title}">Ordini</h1>
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th th:text="#{admin.carts.customer}">Cliente</th>
                <th th:text="#{common.date}">Data</th>
                <th th:text="#{common.total}">Totale</th>
                <th th:text="#{common.status}">Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}">1</td>
                <td th:text="${order.customerId}">1</td>
                <td th:text="${order.createdAt}">-</td>
                <td th:text="${order.total != null ? #numbers.formatDecimal(order.total, 1, 'POINT', 2, 'POINT') : '0.00'}">0.00</td>
                <td th:text="${order.status}">NEW</td>
            </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
