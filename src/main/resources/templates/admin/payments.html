<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{admin.payments.title}">Admin Pagamenti</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <h1 th:text="#{admin.payments.title}">Pagamenti</h1>
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th th:text="#{common.order}">Order</th>
                <th th:text="#{common.amount}">Importo</th>
                <th th:text="#{common.currency}">Valuta</th>
                <th th:text="#{common.status}">Status</th>
                <th th:text="#{common.provider}">Provider</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="payment : ${payments}">
                <td th:text="${payment.id}">1</td>
                <td th:text="${payment.orderId}">1</td>
                <td th:text="${payment.amount != null ? #numbers.formatDecimal(payment.amount, 1, 'POINT', 2, 'POINT') : '0.00'}">0.00</td>
                <td th:text="${payment.currency}">EUR</td>
                <td th:text="${payment.status}">NEW</td>
                <td th:text="${payment.provider}">manual</td>
            </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
