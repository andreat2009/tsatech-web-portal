<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{admin.pricing.title}">Admin Prezzi</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <div class="page-header">
        <h1 th:text="#{admin.pricing.title}">Prezzi</h1>
        <a class="btn" th:href="@{/admin/marketing/coupon}" th:text="#{admin.pricing.goto.coupons}">Vai ai coupon</a>
    </div>
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th th:text="#{common.product}">Prodotto</th>
                <th th:text="#{common.amount}">Importo</th>
                <th th:text="#{common.currency}">Valuta</th>
                <th th:text="#{common.active}">Attivo</th>
                <th th:text="#{common.updated.at}">Aggiornato</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="price : ${prices}">
                <td th:text="${price.id}">1</td>
                <td th:text="${price.productId}">1001</td>
                <td th:text="${price.amount != null ? #numbers.formatDecimal(price.amount, 1, 'POINT', 2, 'POINT') : '0.00'}">0.00</td>
                <td th:text="${price.currency}">EUR</td>
                <td th:text="${price.active}">true</td>
                <td th:text="${price.updatedAt}">-</td>
            </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
