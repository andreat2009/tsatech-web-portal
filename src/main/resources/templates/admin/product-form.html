<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${formTitle}">Prodotto</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <h1 th:text="${formTitle}">Prodotto</h1>
    <form class="form" th:action="${formAction}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="field">
            <label>SKU</label>
            <input type="text" name="sku" th:value="${product.sku}" />
        </div>
        <div class="field">
            <label>Nome</label>
            <input type="text" name="name" th:value="${product.name}" required />
        </div>
        <div class="field">
            <label>Modello</label>
            <input type="text" name="model" th:value="${product.model}" />
        </div>
        <div class="field">
            <label>Descrizione</label>
            <textarea name="description" rows="4" th:text="${product.description}"></textarea>
        </div>
        <div class="field grid-2">
            <div>
                <label>Prezzo</label>
                <input type="number" step="0.01" name="price" th:value="${product.price}" required />
            </div>
            <div>
                <label>Quantità</label>
                <input type="number" name="quantity" th:value="${product.quantity}" required />
            </div>
        </div>
        <div class="field">
            <label>Attivo</label>
            <select name="active">
                <option value="true" th:selected="${product.active}">Sì</option>
                <option value="false" th:selected="${product.active == false}">No</option>
            </select>
        </div>
        <div class="actions">
            <button class="btn btn-primary" type="submit">Salva</button>
            <a class="btn" th:href="@{/admin/products}">Annulla</a>
        </div>
    </form>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
