<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Admin Prodotti</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <div class="page-header">
        <h1>Prodotti</h1>
        <a class="btn btn-primary" th:href="@{/admin/products/new}">Nuovo prodotto</a>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>SKU</th>
                <th>Nome</th>
                <th>Prezzo</th>
                <th>Quantità</th>
                <th>Stato</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}">1</td>
                <td th:text="${product.sku}">SKU</td>
                <td th:text="${product.name}">Name</td>
                <td th:text="${product.price}">0.00</td>
                <td th:text="${product.quantity}">0</td>
                <td th:text="${product.active} ? 'Active' : 'Disabled'">Active</td>
                <td class="actions">
                    <a class="btn" th:href="@{/admin/products/{id}/edit(id=${product.id})}">Modifica</a>
                    <form th:action="@{/admin/products/{id}/delete(id=${product.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="btn btn-link" type="submit">Elimina</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
