<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Prodotti</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <div class="page-header">
        <h1>Prodotti</h1>
        <a class="btn btn-primary" th:href="@{/admin/catalogo/prodotti/nuovo}">Nuovo prodotto</a>
    </div>

    <div class="table-wrap">
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Immagine</th>
                    <th>SKU</th>
                    <th>Nome</th>
                    <th>Prezzo</th>
                    <th>Quantità</th>
                    <th>Stato</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}">1</td>
                    <td>
                        <img class="table-thumb"
                             th:if="${product.primaryImageUrl != null and !product.primaryImageUrl.isBlank()}"
                             th:src="${product.primaryImageUrl}"
                             th:alt="${product.name}" />
                        <span class="muted" th:if="${product.primaryImageUrl == null or product.primaryImageUrl.isBlank()}">N/D</span>
                    </td>
                    <td th:text="${product.sku}">SKU</td>
                    <td>
                        <a th:href="${product.seoPath}" th:text="${product.name}" target="_blank" rel="noopener">Name</a>
                    </td>
                    <td th:text="${product.price}">0.00</td>
                    <td th:text="${product.quantity}">0</td>
                    <td>
                        <span class="badge" th:classappend="${product.active} ? ' badge-success' : ' badge-muted'"
                              th:text="${product.active} ? 'Attivo' : 'Disattivo'">Attivo</span>
                    </td>
                    <td class="actions table-actions">
                        <a class="btn" th:href="@{/admin/catalogo/prodotti/{id}/modifica(id=${product.id})}">Modifica</a>
                        <form th:action="@{/admin/catalogo/prodotti/{id}/delete(id=${product.id})}" method="post">
                            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button class="btn btn-link" type="submit">Elimina</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
