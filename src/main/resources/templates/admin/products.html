<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="#{admin.products.title}">Admin Prodotti</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <div class="page-header">
        <h1 th:text="#{admin.products.title}">Prodotti</h1>
        <a class="btn btn-primary" th:href="@{/admin/catalogo/prodotti/nuovo}" th:text="#{admin.product.new}">Nuovo prodotto</a>
    </div>

    <p class="alert-error" th:if="${uploadError}" th:text="#{admin.products.upload.error}">Upload immagini non valido. Riprova dalla schermata prodotto.</p>

    <div class="table-wrap">
        <table class="table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th th:text="#{common.image}">Immagine</th>
                    <th th:text="#{common.sku}">SKU</th>
                    <th th:text="#{common.name}">Nome</th>
                    <th th:text="#{common.price}">Prezzo</th>
                    <th th:text="#{common.quantity}">Quantità</th>
                    <th th:text="#{common.status}">Stato</th>
                    <th th:text="#{common.actions}">Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.id}">1</td>
                    <td>
                        <img class="table-thumb"
                             th:if="${product.primaryImageUrl != null and !product.primaryImageUrl.isBlank()}"
                             th:src="${product.primaryImageUrl}"
                             th:alt="${product.name}" />
                        <span class="muted" th:if="${product.primaryImageUrl == null or product.primaryImageUrl.isBlank()}" th:text="#{common.na}">N/D</span>
                    </td>
                    <td th:text="${product.sku}">SKU</td>
                    <td>
                        <a th:href="${product.seoPath}" th:text="${product.name}" target="_blank" rel="noopener">Name</a>
                    </td>
                    <td th:text="${product.price != null ? #numbers.formatDecimal(product.price, 1, 'POINT', 2, 'POINT') : '0.00'}">0.00</td>
                    <td th:text="${product.quantity}">0</td>
                    <td>
                        <span class="badge" th:classappend="${product.active} ? ' badge-success' : ' badge-muted'"
                              th:text="${product.active ? #messages.msg('common.active') : #messages.msg('common.inactive')}">Attivo</span>
                    </td>
                    <td class="actions table-actions">
                        <a class="btn" th:href="@{/admin/catalogo/prodotti/{id}/modifica(id=${product.id})}" th:text="#{common.edit}">Modifica</a>
                        <form th:action="@{/admin/catalogo/prodotti/{id}/delete(id=${product.id})}" method="post">
                            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button class="btn btn-link" type="submit" th:text="#{common.delete}">Elimina</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
