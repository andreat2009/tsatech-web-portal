<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Resi</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="page-header">
        <h1>Gestione resi</h1>
        <a class="btn" th:href="@{/admin}">Dashboard</a>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Order</th>
            <th>Customer</th>
            <th>Reason</th>
            <th>Status</th>
            <th>Created</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ret : ${returns}">
            <td th:text="${ret.id}">1</td>
            <td th:text="${ret.orderId}">100</td>
            <td th:text="${ret.customerId}">10</td>
            <td th:text="${ret.reason}">reason</td>
            <td th:text="${ret.status}">REQUESTED</td>
            <td th:text="${ret.createdAt}">-</td>
        </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
