<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Recensioni</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="page-header">
        <h1>Recensioni prodotti</h1>
        <div class="actions">
            <a class="btn" th:href="@{/admin/reviews}">Tutte</a>
            <a class="btn" th:href="@{/admin/reviews(approved=true)}">Solo approvate</a>
            <a class="btn" th:href="@{/admin/reviews(approved=false)}">Da moderare</a>
        </div>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>Prodotto</th>
            <th>Autore</th>
            <th>Rating</th>
            <th>Titolo</th>
            <th>Stato</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="review : ${reviews}">
            <td th:text="${review.id}">1</td>
            <td th:text="${review.productId}">1001</td>
            <td th:text="${review.authorName}">Author</td>
            <td th:text="${review.rating}">5</td>
            <td th:text="${review.title}">Title</td>
            <td th:text="${review.approved} ? 'APPROVATA' : 'IN ATTESA'">STATE</td>
            <td class="actions">
                <form th:if="${!review.approved}" th:action="@{/admin/reviews/{id}/approve(id=${review.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="approved" value="true" />
                    <button class="btn btn-primary" type="submit">Approva</button>
                </form>
                <form th:if="${review.approved}" th:action="@{/admin/reviews/{id}/approve(id=${review.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="approved" value="false" />
                    <button class="btn" type="submit">Disapprova</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
