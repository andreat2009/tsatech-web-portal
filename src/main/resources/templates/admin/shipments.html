<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{admin.shipments.title}">Admin Spedizioni</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <h1 th:text="#{admin.shipments.title}">Spedizioni</h1>
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th th:text="#{common.order}">Order</th>
                <th th:text="#{common.carrier}">Carrier</th>
                <th th:text="#{common.tracking}">Tracking</th>
                <th th:text="#{common.status}">Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="shipment : ${shipments}">
                <td th:text="${shipment.id}">1</td>
                <td th:text="${shipment.orderId}">1</td>
                <td th:text="${shipment.carrier}">Carrier</td>
                <td th:text="${shipment.trackingNumber}">TRK</td>
                <td th:text="${shipment.status}">NEW</td>
            </tr>
        </tbody>
    </table>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
