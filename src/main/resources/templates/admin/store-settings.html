<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="#{admin.settings.title}">Store settings</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container admin">
    <div class="page-header">
        <h1 th:text="#{admin.settings.heading}">Store settings</h1>
        <a class="btn" th:href="@{/admin}" th:text="#{menu.admin}">Admin</a>
    </div>

    <p class="alert-success" th:if="${param.success}" th:text="#{admin.settings.saved}">Settings saved.</p>
    <p class="alert-error" th:if="${param.error != null and param.error[0] == 'logo_size'}" th:text="#{admin.settings.logo.error.size}">Logo too large.</p>
    <p class="alert-error" th:if="${param.error != null and param.error[0] == 'logo_type'}" th:text="#{admin.settings.logo.error.type}">Invalid logo format.</p>
    <p class="alert-error" th:if="${param.error != null and param.error[0] == 'logo_upload'}" th:text="#{admin.settings.logo.error.upload}">Logo upload failed.</p>

    <form class="form" method="post" enctype="multipart/form-data" th:action="@{/admin/store-settings}" th:object="${settingsForm}">
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <h2 th:text="#{admin.settings.section.store}">Store details</h2>
        <div class="field-grid two">
            <div class="field">
                <label th:text="#{admin.settings.site.name}">Site name</label>
                <input th:field="*{siteName}" required />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.logo.url}">Logo URL</label>
                <input th:field="*{logoUrl}" placeholder="https://..." />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.logo.size}">Logo height (px)</label>
                <input type="number" min="32" max="220" step="1" th:field="*{logoMaxHeightPx}" />
                <small class="muted" th:text="#{admin.settings.logo.size.hint}">Allowed range: 32-220 px.</small>
            </div>
            <div class="field">
                <label th:text="#{admin.settings.site.name.size}">Site name size (px)</label>
                <input type="number" min="14" max="56" step="1" th:field="*{siteNameFontSizePx}" />
                <small class="muted" th:text="#{admin.settings.site.name.size.hint}">Allowed range: 14-56 px.</small>
            </div>
            <div class="field full-width">
                <label th:text="#{admin.settings.logo.current}">Current logo</label>
                <div class="store-logo-preview" th:if="${settingsForm.logoUrl != null and !#strings.isEmpty(settingsForm.logoUrl)}">
                    <img th:src="${settingsForm.logoUrl}" th:alt="#{admin.settings.logo.current}" th:style="${'max-height: '+ ((settingsForm.logoMaxHeightPx != null) ? settingsForm.logoMaxHeightPx : 96) + 'px;'}" />
                </div>
                <small class="muted" th:if="${settingsForm.logoUrl == null or #strings.isEmpty(settingsForm.logoUrl)}" th:text="#{admin.settings.logo.current.none}">No logo configured.</small>
            </div>
            <div class="field">
                <label th:text="#{admin.settings.logo.upload}">Upload logo</label>
                <input type="file" name="logoFile" accept="image/jpeg,image/png,image/webp,image/gif" />
                <small class="muted" th:text="#{admin.settings.logo.upload.hint}">Accepted: JPG/PNG/WEBP/GIF, max 1MB.</small>
            </div>
            <div class="field">
                <label th:text="#{admin.settings.logo.remove}">Remove logo</label>
                <div class="inline-control danger">
                    <input id="removeLogo" type="checkbox" name="removeLogo" value="true" />
                    <label for="removeLogo" th:text="#{admin.settings.logo.remove.check}">Remove current logo</label>
                </div>
            </div>
            <div class="field">
                <label th:text="#{admin.settings.contact.email}">Contact email</label>
                <input type="email" th:field="*{contactEmail}" />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.support.email}">Support email</label>
                <input type="email" th:field="*{supportEmail}" />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.support.phone}">Support phone</label>
                <input th:field="*{supportPhone}" />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.support.phone2}">Secondary phone</label>
                <input th:field="*{supportPhoneSecondary}" />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.address1}">Address line 1</label>
                <input th:field="*{addressLine1}" />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.address2}">Address line 2</label>
                <input th:field="*{addressLine2}" />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.city}">City</label>
                <input th:field="*{city}" />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.postal}">Postal code</label>
                <input th:field="*{postalCode}" />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.country}">Country</label>
                <input th:field="*{country}" />
            </div>
        </div>

        <h2 th:text="#{admin.settings.section.smtp}">SMTP</h2>
        <div class="field-grid two">
            <div class="field full-width">
                <div class="inline-control">
                    <input type="checkbox" th:field="*{smtpEnabled}" />
                    <label th:text="#{admin.settings.smtp.enabled}">Enable SMTP</label>
                </div>
            </div>
            <div class="field">
                <label th:text="#{admin.settings.smtp.host}">Host</label>
                <input th:field="*{smtpHost}" placeholder="smtp.gmail.com" />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.smtp.port}">Port</label>
                <input type="number" min="1" th:field="*{smtpPort}" />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.smtp.user}">Username</label>
                <input th:field="*{smtpUsername}" />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.smtp.password}">Password</label>
                <input type="password" th:field="*{smtpPassword}" placeholder="********" />
                <small class="muted" th:text="#{admin.settings.smtp.password.hint}">Leave empty to keep current password.</small>
            </div>
            <div class="field">
                <label th:text="#{admin.settings.mail.from.email}">From email</label>
                <input type="email" th:field="*{mailFromEmail}" />
            </div>
            <div class="field">
                <label th:text="#{admin.settings.mail.from.name}">From name</label>
                <input th:field="*{mailFromName}" />
            </div>
            <div class="field full-width settings-inline-flags">
                <div class="inline-control">
                    <input type="checkbox" th:field="*{smtpAuth}" />
                    <label th:text="#{admin.settings.smtp.auth}">SMTP AUTH</label>
                </div>
                <div class="inline-control">
                    <input type="checkbox" th:field="*{smtpStarttls}" />
                    <label th:text="#{admin.settings.smtp.starttls}">STARTTLS</label>
                </div>
            </div>
        </div>

        <div class="actions-row">
            <button class="btn btn-primary" type="submit" th:text="#{common.save}">Save</button>
            <a class="btn" th:href="@{/admin}" th:text="#{common.cancel}">Cancel</a>
        </div>
    </form>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
