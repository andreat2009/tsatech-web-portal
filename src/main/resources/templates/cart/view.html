<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Carrello</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <h1>Carrello</h1>
    <div th:if="${items.isEmpty()}" class="empty">Il carrello è vuoto.</div>

    <table class="table" th:if="${!items.isEmpty()}">
        <thead>
            <tr>
                <th>Prodotto</th>
                <th>Quantità</th>
                <th>Prezzo</th>
                <th>Totale</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.productName}">Name</td>
                <td th:text="${item.quantity}">1</td>
                <td th:text="${item.unitPrice}">0.00</td>
                <td th:text="${item.lineTotal}">0.00</td>
                <td>
                    <form th:action="@{/cart/items/{id}/delete(id=${item.id})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="btn btn-link" type="submit">Rimuovi</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="checkout" th:if="${!items.isEmpty()}">
        <div class="summary">
            <div class="label">Totale</div>
            <div class="value" th:text="${total}">0.00</div>
        </div>
        <form th:action="@{/checkout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button class="btn btn-primary" type="submit">Checkout</button>
        </form>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
