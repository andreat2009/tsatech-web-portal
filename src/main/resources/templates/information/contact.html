<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contatti</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
    <section class="form section-pad contact-form">
        <h1>Contattaci</h1>
        <p th:if="${param.success}" class="alert-success">Messaggio inviato con successo.</p>
        <p th:if="${param.error}" class="alert-error">Compila tutti i campi richiesti.</p>
        <form method="post" th:action="@{/contatti}" th:object="${contactForm}">
            <div class="field"><label>Nome</label><input type="text" th:field="*{name}" /></div>
            <div class="field"><label>Email</label><input type="email" th:field="*{email}" /></div>
            <div class="field"><label>Oggetto</label><input type="text" th:field="*{subject}" /></div>
            <div class="field"><label>Messaggio</label><textarea th:field="*{message}"></textarea></div>
            <button class="btn btn-primary" type="submit">Invia</button>
        </form>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
