<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="#{info.sitemap.title}">Sitemap</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
    <section class="card section-pad block">
        <h1 th:text="#{info.sitemap.heading}">Sitemap</h1>
    </section>
    <section class="card section-pad block">
        <h2 th:text="#{info.sitemap.blog}">Blog</h2>
        <ul data-paginate-collection="true" data-paginate="10" data-pagination-item="li">
            <li th:each="post : ${blogPosts}"><a th:href="@{/news/{slug}(slug=${post.slug})}" th:text="${post.title}">Post</a></li>
        </ul>
    </section>
    <section class="card section-pad block">
        <h2 th:text="#{info.sitemap.categories}">Categories</h2>
        <ul data-paginate-collection="true" data-paginate="10" data-pagination-item="li">
            <li th:each="c : ${categories}"><a th:href="@{/catalogo(categoryId=${c.id})}" th:text="${c.name}">Category</a></li>
        </ul>
    </section>
    <section class="card section-pad">
        <h2 th:text="#{info.sitemap.pages}">Information pages</h2>
        <ul data-paginate-collection="true" data-paginate="10" data-pagination-item="li">
            <li th:each="p : ${informationPages}">
                <a th:href="@{/information/{slug}(slug=${p.slug})}" th:text="${p.title}">Info</a>
            </li>
        </ul>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
