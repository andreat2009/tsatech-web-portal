<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confronta prodotti</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
    <div class="breadcrumbs">
        <a th:href="@{/}">Home</a>
        <span>/</span>
        <span>Confronta</span>
    </div>

    <section class="card section-pad">
        <h1>Confronta prodotti</h1>
        <div class="table-wrap">
            <table class="table">
                <thead>
                <tr>
                    <th>Prodotto</th>
                    <th>SKU</th>
                    <th>Prezzo</th>
                    <th>Disponibilità</th>
                    <th>Azioni</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <td><a th:href="${p.seoPath}" th:text="${p.name}">Prodotto</a></td>
                    <td th:text="${p.sku}">SKU</td>
                    <td th:text="${p.price}">0.00</td>
                    <td th:text="${p.quantity}">0</td>
                    <td>
                        <form method="post" th:action="@{/catalogo/confronta/{id}/rimuovi(id=${p.id})}">
                            <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button class="btn" type="submit">Rimuovi</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}"><td colspan="5">Nessun prodotto in confronto.</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
