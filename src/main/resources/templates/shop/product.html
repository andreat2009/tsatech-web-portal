<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${product.name}">Prodotto</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="product-detail">
        <div class="product-info">
            <h1 th:text="${product.name}">Product</h1>
            <div class="muted" th:text="${product.sku}">SKU</div>
            <p class="desc" th:text="${product.description}">Description</p>
        </div>
        <div class="product-buy">
            <div class="price" th:text="${product.price}">0.00</div>
            <form th:action="@{/cart/add}" method="post" class="buy-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="productId" th:value="${product.id}" />
                <label>Quantità</label>
                <input type="number" name="quantity" min="1" value="1" />
                <button class="btn btn-primary" type="submit">Aggiungi al carrello</button>
            </form>
        </div>
    </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
