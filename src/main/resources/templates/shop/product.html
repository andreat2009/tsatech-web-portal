<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${product.name} + ' | TSATech Store'">Product</title>
    <meta name="description" th:content="${product.description != null ? product.description : #messages.msg('shop.product.description.fallback')}" />
    <link rel="canonical" th:href="${product.seoPath}" />
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>
<body>
<div th:replace="fragments/header :: header"></div>

<main class="container">
    <div class="breadcrumbs">
        <a th:href="@{/}" th:text="#{menu.home}">Home</a>
        <span>/</span>
        <a th:href="@{/catalogo}" th:text="#{menu.catalog}">Catalog</a>
        <span>/</span>
        <span th:text="${product.name}">Product</span>
    </div>

    <div class="product-detail">
        <div class="product-info card-lite">
            <div class="product-media-main">
                <img class="product-main-image"
                     th:if="${product.primaryImageUrl != null and !product.primaryImageUrl.isBlank()}"
                     th:src="${product.primaryImageUrl}"
                     th:alt="${product.name}" />
                <div class="image-placeholder" th:if="${product.primaryImageUrl == null or product.primaryImageUrl.isBlank()}"
                     th:text="${product.sku != null ? product.sku : 'SKU'}">SKU</div>
            </div>

            <div class="product-gallery" th:if="${product.galleryImages != null and !product.galleryImages.isEmpty()}">
                <a class="gallery-thumb" th:each="img : ${product.galleryImages}" th:href="${img.url}" target="_blank" rel="noopener">
                    <img th:src="${img.url}" th:alt="${img.originalFilename}" loading="lazy" />
                </a>
            </div>

            <h1 th:text="${product.name}">Product</h1>
            <div class="muted" th:text="${product.sku}">SKU</div>
            <p class="desc" th:text="${product.description}">Description</p>
            <div class="meta-grid">
                <div><strong th:text="#{shop.product.meta.model} + ':'">Model:</strong> <span th:text="${product.model}">MODEL</span></div>
                <div><strong th:text="#{shop.product.meta.availability} + ':'">Availability:</strong> <span th:text="${product.quantity}">0</span></div>
                <div><strong th:text="#{shop.product.meta.avg.rating} + ':'">Average rating:</strong> <span th:text="${#numbers.formatDecimal(avgRating,1,1)}">0.0</span></div>
                <div><strong th:text="#{shop.product.meta.reviews} + ':'">Reviews:</strong> <span th:text="${reviews.size()}">0</span></div>
            </div>
        </div>
        <div class="product-buy">
            <p class="price" th:text="${product.price != null ? #numbers.formatDecimal(product.price, 1, 'POINT', 2, 'POINT') : '0.00'}">0.00</p>
            <form th:action="@{/cart/add}" method="post" class="buy-form">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="productId" th:value="${product.id}" />
                <label th:text="#{common.quantity}">Quantity</label>
                <input type="number" name="quantity" min="1" value="1" />
                <button class="btn btn-primary" type="submit" th:text="#{shop.product.add.to.cart}">Add to cart</button>
            </form>
            <div class="stack-actions">
                <form th:action="@{/account/lista-desideri/aggiungi}" method="post" sec:authorize="isAuthenticated()">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="productId" th:value="${product.id}" />
                    <button class="btn" type="submit"
                            th:text="${wishlistProductIds.contains(product.id) ? #messages.msg('shop.product.in.wishlist') : #messages.msg('shop.product.add.wishlist')}">Wishlist</button>
                </form>
                <form th:action="@{/catalogo/confronta/aggiungi}" method="post">
                    <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="productId" th:value="${product.id}" />
                    <button class="btn" type="submit" th:text="#{shop.product.compare}">Compare product</button>
                </form>
                <a class="btn" th:href="@{/carrello}" th:text="#{shop.product.goto.cart}">Go to cart</a>
                <a class="btn" th:href="@{/oauth2/authorization/keycloak}" sec:authorize="!isAuthenticated()" th:text="#{shop.product.login.optional}">Login (optional)</a>
            </div>
        </div>
    </div>

    <section class="reviews">
        <h2 th:text="#{shop.product.reviews}">Reviews</h2>
        <div th:if="${reviews.isEmpty()}" class="empty" th:text="#{shop.product.reviews.empty}">No approved reviews.</div>
        <div class="review-card" th:each="review : ${reviews}">
            <div class="review-head">
                <strong th:text="${review.authorName}">Author</strong>
                <span class="muted" th:text="${review.createdAt}">date</span>
            </div>
            <div class="review-rating" th:text="#{shop.product.review.rating} + ': ' + ${review.rating} + '/5'">Rating</div>
            <h3 th:text="${review.title}">Title</h3>
            <p th:text="${review.text}">Text</p>
        </div>

        <div sec:authorize="isAuthenticated()" class="review-form-wrap">
            <h3 th:text="#{shop.product.review.write}">Write a review</h3>
            <form class="form" th:action="${product.seoReviewsPath}" method="post" th:object="${reviewForm}">
                <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="field">
                    <label th:text="#{common.title}">Title</label>
                    <input th:field="*{title}" />
                </div>
                <div class="field">
                    <label th:text="#{common.rating}">Rating</label>
                    <select th:field="*{rating}">
                        <option value="5">5</option>
                        <option value="4">4</option>
                        <option value="3">3</option>
                        <option value="2">2</option>
                        <option value="1">1</option>
                    </select>
                </div>
                <div class="field">
                    <label th:text="#{common.comment}">Comment</label>
                    <textarea th:field="*{text}" rows="4" required></textarea>
                </div>
                <button class="btn btn-primary" type="submit" th:text="#{shop.product.review.submit}">Submit review</button>
            </form>
        </div>
    </section>
</main>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
